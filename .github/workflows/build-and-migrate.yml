name: Build and Optional Migration

on:
  workflow_dispatch:

jobs:
  build-and-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          # Provide production-ready environment variables for build
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          POSTGRES_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: production-auth-secret-32-chars-minimum-secure-key
          NEXTAUTH_SECRET: production-nextauth-secret-32-chars-minimum-secure
          NEXTAUTH_URL: https://triumphsynergy0576.pinet.com
          PI_NETWORK_MODE: mainnet
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: https://triumph-synergy.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyaXVtcGgtc3luZXJneSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNjgzNjQ4MDAwLCJleHAiOjE5OTkyMjQwMDB9.production-anon-key-placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRyaXVtcGgtc3luZXJneSIsInJvbGUiOiJzZXJ2aWNlX3JvbGUiLCJpYXQiOjE2ODM2NDgwMDAsImV4cCI6MTk5OTIyNDAwMH0.production-service-role-key-placeholder
          PI_API_KEY: production-pi-api-key-placeholder
          PI_INTERNAL_API_KEY: production-pi-internal-api-key-placeholder
          STELLAR_HORIZON_URL: https://horizon.stellar.org
          GITHUB_WEBHOOK_SECRET: production-github-webhook-secret-placeholder
          INTERNAL_PI_MULTIPLIER: 1.5
          INTERNAL_PI_MIN_VALUE: 10.0
          EXTERNAL_PI_MIN_VALUE: 1.0
        run: pnpm run build
