name: Build and (Optional) Migrate

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          # Provide dummy values for build-time environment variables
          POSTGRES_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-secret-for-build-only
          REDIS_URL: redis://localhost:6379
        run: pnpm run build

  # Note: To run migrations in GitHub Actions, set repository secret `RUN_MIGRATIONS` to `true`
  # and add `POSTGRES_URL` as a secret. For Vercel, prefer running migrations from CI or
  # a dedicated deployment hook rather than during Vercel build.

