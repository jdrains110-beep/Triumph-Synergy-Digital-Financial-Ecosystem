name: Smart Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - "lib/smart-contracts/**"
      - ".github/workflows/smart-contracts-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "lib/smart-contracts/**"

jobs:
  test:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript compilation check
        run: pnpm tsc --noEmit

      - name: Run unit tests
        run: pnpm test:unit lib/smart-contracts/pi-stable-revoluter-core/tests/

      - name: Run linter
        run: pnpm lint lib/smart-contracts/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Check for vulnerable dependencies
        run: npm audit fix --dry-run

  solidity:
    name: Solidity Contracts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Solidity compiler
        run: |
          sudo add-apt-repository ppa:ethereum/ethereum
          sudo apt-get update
          sudo apt-get install -y solc

      - name: Verify Solidity version
        run: solc --version

      - name: Compile Solidity contracts
        run: |
          for contract in lib/smart-contracts/pi-stable-revoluter-core/contracts/*.sol; do
            echo "Compiling $contract..."
            solc --optimize --bin --abi "$contract" -o build/ || true
          done

      - name: List compiled contracts
        run: ls -la build/ || echo "No contracts compiled"

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, solidity]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test lib/smart-contracts/pi-stable-revoluter-core/
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 30

  documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation exists
        run: |
          test -f lib/smart-contracts/pi-stable-revoluter-core/docs/README.md
          test -f docs/pi-stable-revoluter-core-integration.md
          echo "✅ All documentation files present"

      - name: Validate markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            docs/pi-stable-revoluter-core-integration.md
            lib/smart-contracts/pi-stable-revoluter-core/docs/README.md
        continue-on-error: true
