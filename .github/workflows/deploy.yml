# Triumph Synergy CI/CD Pipeline
# Simplified test and notification workflow

name: Test and Notify

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        continue-on-error: true
        run: pnpm lint

      - name: Type check
        continue-on-error: true
        run: pnpm tsc --noEmit

      - name: Run migrations
        continue-on-error: true
        env:
          SUPABASE_DB_URL: postgresql://postgres:password@localhost:5432/test
          RUN_MIGRATIONS: true
        run: pnpm db:migrate

      - name: Run tests
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/test
          POSTGRES_URL: postgresql://postgres:password@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          PLAYWRIGHT: true
        run: pnpm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  notify:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()

    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        continue-on-error: true
        with:
          status: ${{ job.status }}
          text: |
            Build and test ${{ job.status }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
