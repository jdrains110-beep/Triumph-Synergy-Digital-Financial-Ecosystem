# Triumph Synergy CI/CD Pipeline
# GitHub Actions workflow for complete deployment

name: Deploy Triumph Synergy

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  GKE_CLUSTER: triumph-synergy-production
  REGISTRY: gcr.io
  IMAGE_NAME: triumph-synergy/app
  
jobs:
  # Lint and test
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
    
    - name: Install pnpm
      run: npm install -g pnpm@9.12.3
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Lint
      run: pnpm lint
    
    - name: Type check
      run: pnpm tsc --noEmit
    
    - name: Run migrations
      env:
        SUPABASE_DB_URL: postgresql://postgres:password@localhost:5432/test
        RUN_MIGRATIONS: true
      run: pnpm db:migrate
    
    - name: Run tests
      env:
        POSTGRES_URL: postgresql://postgres:password@localhost:5432/test
        REDIS_URL: redis://localhost:6379
        PLAYWRIGHT: true
      run: pnpm test
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/
  
  # Security scanning
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pnpm
      run: npm install -g pnpm@9.12.3
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'
  
  # Build and push Docker images (disabled - requires GCP credentials)
  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: false  # Disabled until GCP credentials are configured
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Configure Docker for GCR
      run: gcloud auth configure-docker
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push application
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
    
    - name: Build and push payment processor
      uses: docker/build-push-action@v5
      with:
        context: ./services/payment-processor
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/payment-processor:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
  
  # Deploy to GKE (disabled - requires GCP credentials)
  deploy-gcp:
    runs-on: ubuntu-latest
    needs: build
    if: false  # Disabled until GCP credentials are configured
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GCP_REGION }}
    
    - name: Deploy to GKE
      run: |
        kubectl set image deployment/triumph-app \
          app=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n triumph-synergy
        
        kubectl set image deployment/payment-processor \
          processor=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/payment-processor:${{ github.sha }} \
          -n triumph-synergy
        
        kubectl rollout status deployment/triumph-app -n triumph-synergy
        kubectl rollout status deployment/payment-processor -n triumph-synergy
    
    - name: Verify deployment
      run: |
        kubectl get pods -n triumph-synergy
        kubectl get services -n triumph-synergy
  
  # Deploy to AWS (Backup) (disabled - requires AWS credentials)
  deploy-aws:
    runs-on: ubuntu-latest
    needs: build
    if: false  # Disabled until AWS credentials are configured
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    
    - name: Update kubeconfig for EKS
      run: aws eks update-kubeconfig --name triumph-synergy-backup-production --region us-east-1
    
    - name: Deploy to EKS
      run: |
        kubectl set image deployment/triumph-app \
          app=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n triumph-synergy
        
        kubectl rollout status deployment/triumph-app -n triumph-synergy
  
  # Database migrations (disabled - requires production DB credentials)
  migrate:
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: false  # Disabled until production DB is configured
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pnpm
      run: npm install -g pnpm@9.12.3
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Run migrations
      env:
        SUPABASE_DB_URL: ${{ secrets.PRODUCTION_DB_URL }}
      run: pnpm db:migrate
  
  # Performance testing (disabled - requires K6 cloud token)
  performance:
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: false  # Disabled until K6 is configured
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run k6 load test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: tests/performance/load-test.js
      env:
        K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
  
  # Notify deployment
  notify:
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()
    
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      continue-on-error: true
      with:
        status: ${{ job.status }}
        text: |
          Build and test ${{ job.status }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: secrets.SLACK_WEBHOOK != ''
