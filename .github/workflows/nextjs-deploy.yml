name: Build & Deploy tmtt_nextjs

on:
    push:
        paths:
            - "tmtt_nextjs/**"
            - ".github/workflows/nextjs-deploy.yml"
        branches:
            - main
    pull_request:
        paths:
            - "tmtt_nextjs/**"
        branches:
            - main
    workflow_dispatch:

jobs:
    build-nextjs:
        name: Build Next.js Application
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: "tmtt_nextjs/package-lock.json"

            - name: Install dependencies
              working-directory: tmtt_nextjs
              run: npm install

            - name: Check TypeScript
              working-directory: tmtt_nextjs
              run: npx tsc --noEmit || true

            - name: Lint code
              working-directory: tmtt_nextjs
              run: npm run lint || true

            - name: Build Next.js
              working-directory: tmtt_nextjs
              run: npm run build

            - name: Generate build report
              working-directory: tmtt_nextjs
              run: |
                  echo "## Build Report" >> $GITHUB_STEP_SUMMARY
                  echo "✅ Build Status: Success" >> $GITHUB_STEP_SUMMARY
                  echo "📦 Framework: Next.js 16.1.1" >> $GITHUB_STEP_SUMMARY
                  echo "🔧 Node Version: 20" >> $GITHUB_STEP_SUMMARY
                  echo "📄 Output: .next/" >> $GITHUB_STEP_SUMMARY

    deploy-vercel:
        name: Deploy to Vercel
        needs: build-nextjs
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Deploy to Vercel
              uses: vercel/action@v6
              with:
                  vercel-token: ${{ secrets.VERCEL_TOKEN }}
                  vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
                  vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
                  working-directory: tmtt_nextjs
