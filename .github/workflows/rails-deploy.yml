name: Deploy Rails to Heroku

on:
    push:
        paths:
            - "tmpt/**"
            - ".github/workflows/rails-deploy.yml"
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            
            - name: Deploy to Heroku
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
                  HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
              run: |
                  # Install Heroku CLI
                  curl https://cli-assets.heroku.com/install.sh | sh
                  
                  # Get the commit SHA for the tmpt subdirectory
                  SPLIT_COMMIT=$(git subtree split --prefix tmpt HEAD)
                  
                  # Build the Heroku git URL
                  HEROKU_GIT_URL="https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git"
                  
                  # Push to Heroku
                  git push --force "$HEROKU_GIT_URL" "${SPLIT_COMMIT}:refs/heads/main"
