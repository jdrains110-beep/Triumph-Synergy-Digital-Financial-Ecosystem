name: Deploy Rails to Heroku

on:
    push:
        paths:
            - "tmpt/**"
            - ".github/workflows/rails-deploy.yml"
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            
            - name: Deploy to Heroku
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
                  HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
              run: |
                  # Install Heroku CLI
                  curl https://cli-assets.heroku.com/install.sh | sh
                  
                  # Configure git to use netrc for authentication
                  cat > ~/.netrc << EOF
                  machine api.heroku.com
                    login ${{ secrets.HEROKU_EMAIL }}
                    password ${HEROKU_API_KEY}
                  machine git.heroku.com
                    login ${{ secrets.HEROKU_EMAIL }}
                    password ${HEROKU_API_KEY}
                  EOF
                  chmod 600 ~/.netrc
                  
                  # Get the commit SHA for the tmpt subdirectory
                  SPLIT_COMMIT=$(git subtree split --prefix tmpt HEAD)
                  
                  # Push to Heroku using netrc authentication
                  git push --force "https://git.heroku.com/${HEROKU_APP_NAME}.git" "${SPLIT_COMMIT}:refs/heads/main"
