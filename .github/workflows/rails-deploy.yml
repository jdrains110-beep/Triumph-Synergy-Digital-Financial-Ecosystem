name: Deploy Rails to Heroku [DISABLED]

# DISABLED: This workflow was for deploying the tmpt/ subdirectory (legacy Rails app)
# which has been removed from the project as it was causing Turbopack UTF-8 parsing errors.
# 
# The tmpt directory contained Ruby files that were incompatible with the Next.js build toolchain.
# This workflow is kept for reference but is no longer triggered.

on:
  # Disabled - no longer needed
  push:
    paths:
      - "none/**"
    branches:
      - "never"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # This job is disabled - tmpt directory was deleted
    if: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
        run: |
          # Install Heroku CLI
          curl https://cli-assets.heroku.com/install.sh | sh

          # Configure git credentials
          git config --global credential.helper store
          echo "https://heroku:${HEROKU_API_KEY}@git.heroku.com" > ~/.git-credentials

          # Get subdirectory commit
          SPLIT_COMMIT=$(git subtree split --prefix tmpt HEAD)
          echo "Split commit: $SPLIT_COMMIT"

          # Push to Heroku
          git push --force https://git.heroku.com/${HEROKU_APP_NAME}.git ${SPLIT_COMMIT}:refs/heads/main
