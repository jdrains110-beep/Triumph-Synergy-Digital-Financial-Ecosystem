name: Build & Deploy Rails App

on:
    push:
        paths:
            - "tmpt/**"
            - ".github/workflows/rails-deploy.yml"
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy-heroku:
        name: Deploy Rails to Heroku
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Deploy to Heroku
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
                  HEROKU_APP_NAME: ${{ secrets.HEROKU_APP_NAME }}
                  HEROKU_EMAIL: ${{ secrets.HEROKU_EMAIL }}
              run: |
                  # Install Heroku CLI
                  curl https://cli-assets.heroku.com/install.sh | sh
                  
                  # Login to Heroku
                  cat > ~/.netrc <<EOF
                  machine api.heroku.com
                    login $HEROKU_EMAIL
                    password $HEROKU_API_KEY
                  machine git.heroku.com
                    login $HEROKU_EMAIL
                    password $HEROKU_API_KEY
                  EOF
                  
                  # Configure git for subdirectory deployment
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "GitHub Actions"
                  
                  # Add Heroku remote
                  git remote add heroku https://git.heroku.com/$HEROKU_APP_NAME.git || true
                  
                  # Deploy using subtree push
                  git subtree push --prefix tmpt heroku main || git push heroku `git subtree split --prefix tmpt main`:refs/heads/main --force
