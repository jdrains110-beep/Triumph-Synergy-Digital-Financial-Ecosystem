name: Deploy Rails to Heroku

on:
    push:
        paths:
            - "tmpt/**"
            - ".github/workflows/rails-deploy.yml"
        branches:
            - main
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            
            - name: Deploy to Heroku
              env:
                  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
              run: |
                  # Install Heroku CLI
                  curl https://cli-assets.heroku.com/install.sh | sh
                  
                  # Add Heroku git remote
                  git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git || true
                  
                  # Deploy subdirectory using git subtree
                  git push https://heroku:$HEROKU_API_KEY@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git `git subtree split --prefix tmpt HEAD`:refs/heads/main --force
