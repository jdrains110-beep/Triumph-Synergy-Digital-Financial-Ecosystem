# Triumph Synergy Kubernetes Deployment
# Production-grade deployment for the complete ecosystem

apiVersion: v1
kind: Namespace
metadata:
  name: triumph-synergy
  labels:
    name: triumph-synergy
    environment: production

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: triumph-config
  namespace: triumph-synergy
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  LOG_LEVEL: "info"

---
# Secret for sensitive data (create separately with real values)
apiVersion: v1
kind: Secret
metadata:
  name: triumph-secrets
  namespace: triumph-synergy
type: Opaque
stringData:
  POSTGRES_URL: "postgresql://user:pass@cloudsql-proxy:5432/triumph_synergy"
  REDIS_URL: "redis://redis-service:6379"
  AUTH_SECRET: "CHANGE_ME"
  PI_API_KEY: "CHANGE_ME"
  PI_INTERNAL_API_KEY: "CHANGE_ME"
  STELLAR_HORIZON_URL: "https://horizon.stellar.org"
  GITHUB_WEBHOOK_SECRET: "CHANGE_ME"
  SUPABASE_URL: "CHANGE_ME"
  SUPABASE_ANON_KEY: "CHANGE_ME"
  SUPABASE_SERVICE_ROLE_KEY: "CHANGE_ME"

---
# Next.js Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triumph-app
  namespace: triumph-synergy
  labels:
    app: triumph-app
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: triumph-app
  template:
    metadata:
      labels:
        app: triumph-app
    spec:
      containers:
      - name: app
        image: gcr.io/triumph-synergy/app:latest
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: triumph-config
        - secretRef:
            name: triumph-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - triumph-app
              topologyKey: kubernetes.io/hostname

---
# Payment Processor Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: triumph-synergy
  labels:
    app: payment-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
      - name: processor
        image: gcr.io/triumph-synergy/payment-processor:latest
        envFrom:
        - secretRef:
            name: triumph-secrets
        env:
        - name: WORKER_THREADS
          value: "4"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"

---
# Application Service
apiVersion: v1
kind: Service
metadata:
  name: triumph-app-service
  namespace: triumph-synergy
  labels:
    app: triumph-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: triumph-app

---
# Ingress with TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: triumph-ingress
  namespace: triumph-synergy
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
  - hosts:
    - triumph-synergy.com
    - www.triumph-synergy.com
    - api.triumph-synergy.com
    secretName: triumph-tls-cert
  rules:
  - host: triumph-synergy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: triumph-app-service
            port:
              number: 80
  - host: www.triumph-synergy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: triumph-app-service
            port:
              number: 80
  - host: api.triumph-synergy.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: triumph-app-service
            port:
              number: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triumph-app-hpa
  namespace: triumph-synergy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triumph-app
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: triumph-app-pdb
  namespace: triumph-synergy
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: triumph-app

---
# Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triumph-network-policy
  namespace: triumph-synergy
spec:
  podSelector:
    matchLabels:
      app: triumph-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432  # PostgreSQL
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 443   # HTTPS
    - protocol: TCP
      port: 53    # DNS
    - protocol: UDP
      port: 53    # DNS
