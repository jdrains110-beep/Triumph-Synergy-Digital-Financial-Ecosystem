<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi Simple Test</title>
  <style>
    body { background: #1a1a2e; color: white; font-family: sans-serif; padding: 20px; }
    h1 { color: #9d4edd; }
    .log { background: #0f0f1a; padding: 10px; margin: 5px 0; border-radius: 4px; }
    .pass { color: #51cf66; }
    .fail { color: #ff6b6b; }
  </style>
</head>
<body>
  <h1>Pi Simple Test</h1>
  
  <div class="log" id="step1">Step 1: Page loaded - WAITING</div>
  <div class="log" id="step2">Step 2: Basic JS - WAITING</div>
  <div class="log" id="step3">Step 3: Window check - WAITING</div>
  <div class="log" id="step4">Step 4: Pi SDK check - WAITING</div>
  <div class="log" id="step5">Step 5: User Agent - WAITING</div>
  
  <script>
    // Step 1 - immediate
    document.getElementById('step1').innerHTML = 'Step 1: Page loaded - <span class="pass">OK</span>';
  </script>
  
  <script>
    // Step 2 - basic JS
    try {
      var x = 1 + 1;
      document.getElementById('step2').innerHTML = 'Step 2: Basic JS (1+1=' + x + ') - <span class="pass">OK</span>';
    } catch(e) {
      document.getElementById('step2').innerHTML = 'Step 2: Basic JS - <span class="fail">FAILED: ' + e + '</span>';
    }
  </script>
  
  <script>
    // Step 3 - window check
    try {
      var loc = window.location.hostname;
      document.getElementById('step3').innerHTML = 'Step 3: Window check (host=' + loc + ') - <span class="pass">OK</span>';
    } catch(e) {
      document.getElementById('step3').innerHTML = 'Step 3: Window check - <span class="fail">FAILED: ' + e + '</span>';
    }
  </script>
  
  <script>
    // Step 4 - Pi SDK check (no loading, just check if exists)
    try {
      var hasPi = typeof window.Pi !== 'undefined';
      document.getElementById('step4').innerHTML = 'Step 4: Pi SDK exists: ' + hasPi + ' - <span class="pass">OK</span>';
    } catch(e) {
      document.getElementById('step4').innerHTML = 'Step 4: Pi SDK check - <span class="fail">FAILED: ' + e + '</span>';
    }
  </script>
  
  <script>
    // Step 5 - User Agent
    try {
      var ua = navigator.userAgent;
      var isPi = ua.indexOf('PiBrowser') >= 0;
      document.getElementById('step5').innerHTML = 'Step 5: User Agent (Pi Browser: ' + isPi + ') - <span class="pass">OK</span><br><small>' + ua.substring(0,80) + '</small>';
    } catch(e) {
      document.getElementById('step5').innerHTML = 'Step 5: User Agent - <span class="fail">FAILED: ' + e + '</span>';
    }
  </script>
  
  <p style="margin-top:20px;color:#888;">If you see all steps OK, the page works. Crash = one of the steps failed.</p>
</body>
</html>
