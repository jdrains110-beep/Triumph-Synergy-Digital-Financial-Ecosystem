<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pi SDK Raw Diagnostic</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    .card { background: #16213e; padding: 20px; border-radius: 12px; margin: 10px 0; }
    .success { border-left: 4px solid #00ff00; }
    .error { border-left: 4px solid #ff4444; }
    .warning { border-left: 4px solid #ffaa00; }
    .info { border-left: 4px solid #0099ff; }
    button { background: #7b2cbf; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; margin: 5px; font-size: 16px; }
    button:hover { background: #9d4edd; }
    pre { background: #0f0f23; padding: 15px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
    #log { max-height: 400px; overflow-y: auto; }
    h1 { color: #e94560; }
    h2 { color: #0f4c75; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>🔬 Pi SDK Raw Diagnostic</h1>
  <p>This page tests Pi SDK directly without React/Next.js overhead</p>

  <div class="card info">
    <h3>📍 Current Environment</h3>
    <pre id="env-info">Loading...</pre>
  </div>

  <div class="card">
    <h3>🔧 Actions</h3>
    <button onclick="checkPiSDK()">1. Check Pi SDK</button>
    <button onclick="initPiSDK()">2. Init Pi SDK</button>
    <button onclick="authenticatePi()">3. Authenticate</button>
    <button onclick="testPayment()">4. Test Payment</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>

  <div class="card" id="sdk-status">
    <h3>📊 SDK Status</h3>
    <pre id="status-info">Not checked yet</pre>
  </div>

  <div class="card">
    <h3>📜 Console Log</h3>
    <pre id="log"></pre>
  </div>

  <!-- Load Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <script>
    // Logging function
    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warn' ? '⚠️' : 'ℹ️';
      logEl.innerHTML = `[${time}] ${prefix} ${msg}\n` + logEl.innerHTML;
      console.log(`[${type}]`, msg);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Display environment info
    function showEnvInfo() {
      const hostname = window.location.hostname;
      let network = 'unknown';
      let sandbox = true;
      
      // Domain detection
      if (hostname === 'triumphsynergy1991.pinet.com') {
        network = 'TESTNET'; sandbox = true;
      } else if (hostname === 'triumphsynergy7386.pinet.com') {
        network = 'MAINNET'; sandbox = false;
      } else if (hostname === 'triumphsynergy0576.pinet.com') {
        network = 'MAINNET'; sandbox = false;
      } else if (hostname === 'triumph-synergy.vercel.app') {
        network = 'MAINNET'; sandbox = false;
      } else if (hostname === 'triumph-synergy-testnet.vercel.app') {
        network = 'TESTNET'; sandbox = true;
      } else if (hostname === 'localhost' || hostname === '127.0.0.1') {
        network = 'LOCAL/TESTNET'; sandbox = true;
      }

      const userAgent = navigator.userAgent;
      const isPiBrowser = userAgent.includes('PiBrowser') || userAgent.includes('Pi Browser') || userAgent.includes('PiNetwork');
      
      document.getElementById('env-info').innerHTML = `Hostname: ${hostname}
Network: ${network}
Sandbox: ${sandbox}
URL: ${window.location.href}
User-Agent: ${userAgent}
In Pi Browser: ${isPiBrowser ? 'YES ✅' : 'NO ❌'}
window.Pi exists: ${typeof window.Pi !== 'undefined' ? 'YES ✅' : 'NO ❌'}`;

      if (!isPiBrowser) {
        log('NOT in Pi Browser! Pi SDK will not work.', 'error');
      }
    }

    // Check Pi SDK
    function checkPiSDK() {
      log('Checking Pi SDK...');
      
      if (typeof window.Pi === 'undefined') {
        log('window.Pi is UNDEFINED - SDK not loaded!', 'error');
        updateStatus('SDK NOT LOADED', 'error');
        return false;
      }
      
      log('window.Pi exists!', 'success');
      log('Pi object keys: ' + Object.keys(window.Pi).join(', '));
      
      // Check what methods are available
      const methods = ['init', 'authenticate', 'createPayment', 'openShareDialog'];
      methods.forEach(m => {
        if (typeof window.Pi[m] === 'function') {
          log(`  Pi.${m}() - available ✅`);
        } else {
          log(`  Pi.${m}() - NOT available ❌`, 'warn');
        }
      });
      
      updateStatus('SDK LOADED - Not initialized', 'warning');
      return true;
    }

    // Initialize Pi SDK
    async function initPiSDK() {
      log('Initializing Pi SDK...');
      
      if (typeof window.Pi === 'undefined') {
        log('Cannot init - Pi SDK not loaded!', 'error');
        return;
      }
      
      const hostname = window.location.hostname;
      let sandbox = true;
      
      // Domain-based sandbox detection
      if (hostname === 'triumphsynergy7386.pinet.com' || 
          hostname === 'triumphsynergy0576.pinet.com' ||
          hostname === 'triumph-synergy.vercel.app') {
        sandbox = false;
      }
      
      log(`Calling Pi.init({ version: "2.0", sandbox: ${sandbox} })...`);
      
      try {
        await window.Pi.init({ version: "2.0", sandbox: sandbox });
        log('Pi.init() completed successfully!', 'success');
        updateStatus('SDK INITIALIZED - sandbox: ' + sandbox, 'success');
      } catch (err) {
        log('Pi.init() FAILED: ' + (err.message || err), 'error');
        updateStatus('INIT FAILED: ' + err.message, 'error');
      }
    }

    // Authenticate
    async function authenticatePi() {
      log('Starting authentication...');
      
      if (typeof window.Pi === 'undefined') {
        log('Cannot auth - Pi SDK not loaded!', 'error');
        return;
      }
      
      try {
        log('Calling Pi.authenticate(["username", "payments"], callback)...');
        
        const auth = await window.Pi.authenticate(
          ['username', 'payments'],
          function(payment) {
            log('Incomplete payment found: ' + JSON.stringify(payment), 'warn');
          }
        );
        
        log('Authentication SUCCESS!', 'success');
        log('User: ' + JSON.stringify(auth.user));
        log('Access Token: ' + (auth.accessToken ? auth.accessToken.substring(0, 20) + '...' : 'none'));
        
        updateStatus('AUTHENTICATED as ' + (auth.user?.username || auth.user?.uid), 'success');
        
        window.__piAuth = auth;
      } catch (err) {
        log('Authentication FAILED: ' + (err.message || err), 'error');
        updateStatus('AUTH FAILED: ' + err.message, 'error');
      }
    }

    // Test Payment
    function testPayment() {
      log('Testing payment creation...');
      
      if (typeof window.Pi === 'undefined') {
        log('Cannot pay - Pi SDK not loaded!', 'error');
        return;
      }
      
      log('Calling Pi.createPayment()...');
      
      window.Pi.createPayment({
        amount: 0.01,
        memo: 'Test payment from diagnostic page',
        metadata: { test: true, timestamp: Date.now() }
      }, {
        onReadyForServerApproval: function(paymentId) {
          log('onReadyForServerApproval: ' + paymentId, 'success');
          // In real app, send to server for approval
          log('NOTE: Payment needs server-side approval at /api/pi/approve');
        },
        onReadyForServerCompletion: function(paymentId, txid) {
          log('onReadyForServerCompletion: ' + paymentId + ', txid: ' + txid, 'success');
          // In real app, send to server for completion
        },
        onCancel: function(paymentId) {
          log('Payment cancelled: ' + paymentId, 'warn');
        },
        onError: function(error, payment) {
          log('Payment error: ' + (error.message || error), 'error');
          if (payment) log('Payment data: ' + JSON.stringify(payment));
        }
      });
    }

    // Update status display
    function updateStatus(msg, type) {
      const el = document.getElementById('status-info');
      el.textContent = msg;
      el.parentElement.className = 'card ' + type;
    }

    // Initialize on load
    window.onload = function() {
      showEnvInfo();
      log('Page loaded. Click buttons to test Pi SDK.');
      
      // Auto-check after a delay
      setTimeout(function() {
        if (checkPiSDK()) {
          log('Pi SDK script loaded. Ready for init.');
        }
      }, 500);
    };
  </script>
</body>
</html>
