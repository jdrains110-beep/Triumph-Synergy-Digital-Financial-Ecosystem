# ==============================================================================
# Pi Network Nginx Configuration
# ==============================================================================
# Load Balancer for Triumph Synergy + Central Node
# Central Node: GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V
# ==============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 100000;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format pi_network '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent '
                          'central_node="GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V" '
                          'service="$upstream_addr" rt=$request_time';

    access_log /var/log/nginx/access.log pi_network;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/rss+xml application/atom+xml image/svg+xml;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 100m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 32k;
    output_buffers 1 32k;
    postpone_output 1460;

    # Timeouts
    client_header_timeout 60s;
    client_body_timeout 60s;
    send_timeout 60s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/s;
    limit_req_zone $binary_remote_addr zone=transaction_limit:10m rate=10000r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ==========================================================================
    # Upstream Servers - Pi Network Services
    # ==========================================================================

    # Triumph Synergy App
    upstream pi_triumph_app {
        least_conn;
        keepalive 100;
        server pi-triumph-app:3000 weight=5;
    }

    # Central Node (Stellar Core)
    upstream pi_central_node {
        least_conn;
        keepalive 50;
        server pi-central-node:11626 weight=5;
    }

    # Transaction Engine
    upstream pi_transaction_engine {
        least_conn;
        keepalive 200;
        server pi-transaction-engine:8080 weight=5;
    }

    # Trillion Vault
    upstream pi_vault {
        least_conn;
        keepalive 50;
        server pi-trillion-vault:8081 weight=5;
    }

    # Smart Contracts
    upstream pi_smart_contracts {
        least_conn;
        keepalive 100;
        server pi-smart-contracts:8082 weight=5;
    }

    # SCP Upgrader
    upstream pi_scp_upgrader {
        least_conn;
        keepalive 20;
        server pi-scp-upgrader:8083 weight=5;
    }

    # ==========================================================================
    # HTTP Server - Redirect to HTTPS
    # ==========================================================================

    server {
        listen 80;
        listen [::]:80;
        server_name triumphsynergy0576.pinet.com *.pinet.com;

        # Health check endpoint (allow HTTP)
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==========================================================================
    # HTTPS Server - Main Application
    # ==========================================================================

    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name triumphsynergy0576.pinet.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sdk.minepi.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.minepi.com https://api.mainnet.minepi.com wss:;" always;
        add_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V" always;

        # =======================================================================
        # Pi Network API Routes
        # =======================================================================

        # Transaction Engine API
        location /api/pi/transactions {
            limit_req zone=transaction_limit burst=50000 nodelay;
            limit_conn conn_limit 10000;

            proxy_pass http://pi_transaction_engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Connection "";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # Vault API
        location /api/pi/vault {
            limit_req zone=api_limit burst=1000 nodelay;

            proxy_pass http://pi_vault;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Connection "";
        }

        # Smart Contracts API
        location /api/pi/contracts {
            limit_req zone=api_limit burst=5000 nodelay;

            proxy_pass http://pi_smart_contracts;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Connection "";
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # SCP Status API
        location /api/pi/scp {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://pi_scp_upgrader;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Connection "";
        }

        # Central Node Direct Access
        location /api/pi/node {
            limit_req zone=api_limit burst=500 nodelay;

            proxy_pass http://pi_central_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Connection "";
        }

        # =======================================================================
        # General API Routes
        # =======================================================================

        location /api/ {
            limit_req zone=api_limit burst=2000 nodelay;

            proxy_pass http://pi_triumph_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # =======================================================================
        # Static Assets & Main App
        # =======================================================================

        location /_next/static/ {
            proxy_pass http://pi_triumph_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location / {
            proxy_pass http://pi_triumph_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Pi-Central-Node "GA6Z5STFJZPBDQT5VZSDUTCKLXXB626ONTLRWBJAWYKLH4LKPIZCGL7V";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # Health checks
        location /health {
            access_log off;
            proxy_pass http://pi_triumph_app/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
